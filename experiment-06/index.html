<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experiment 06 - Blog Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="intro">
      <p class="tag">Experiment 06</p>
      <h1>Blog Platform</h1>
      <p>Users, profiles, protected posts, comments, and relational data modeling with a full-stack style flow.</p>
    </section>
    <section class="composer">
      <input id="user" placeholder="Profile name">
      <input id="title" placeholder="Post title">
      <textarea id="body" placeholder="Write a post"></textarea>
      <button id="postBtn">Publish Post</button>
    </section>
    <section id="posts" class="posts"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
