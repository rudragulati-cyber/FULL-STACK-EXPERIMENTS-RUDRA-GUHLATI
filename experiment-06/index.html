<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experiment 06 - MERN Axios Integration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container py-4">
    <section class="intro p-4 mb-4">
      <p class="fw-bold mb-1">Experiment 06</p>
      <h1>React-Express Integration with Axios</h1>
      <p class="mb-0">Fetch product data from an Express API, handle loading and error states, and render a responsive Bootstrap grid.</p>
    </section>
    <div class="d-flex gap-2 mb-4">
      <button id="loadBtn" class="btn btn-success">Fetch Products</button>
      <button id="errorBtn" class="btn btn-outline-danger">Simulate Error</button>
    </div>
    <div id="alert"></div>
    <div id="spinner" class="spinner-border text-success d-none" role="status"></div>
    <section id="products" class="row g-3"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
