<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experiment 08 - Login State Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-page">
    <section class="card">
      <p class="tag">Experiment 08</p>
      <h1>Login Form</h1>
      <p>React-style state management with controlled inputs, validation, loading, and feedback.</p>
      <form id="loginForm">
        <label>Email<input id="email" type="email" placeholder="student@example.com"></label>
        <label>Password<input id="password" type="password" placeholder="Minimum 6 characters"></label>
        <button id="submitBtn" type="submit">Login</button>
      </form>
      <div id="feedback" class="feedback"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
